<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>朝の会ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    background: #0a0818;
    font-family: 'Zen Maru Gothic', sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(126,214,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(126,214,255,0.04) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }

  .stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .star {
    position: absolute; border-radius: 50%; background: #fff;
    animation: twinkle var(--dur) ease-in-out infinite;
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.15; }
    50% { opacity: 1; }
  }

  .wrapper {
    position: relative; z-index: 1;
    display: flex; flex-direction: column;
    align-items: center;
    gap: clamp(32px, 6vh, 64px);
    width: 100%;
    max-width: 900px;
    padding: clamp(40px, 8vh, 80px) clamp(20px, 5vw, 48px);
  }

  /* ヘッダー */
  .header {
    text-align: center;
    animation: fadeDown 0.8s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-24px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .header-badge {
    display: inline-block;
    background: linear-gradient(135deg, rgba(255,224,102,0.15), rgba(126,214,255,0.15));
    border: 1px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    font-size: clamp(0.7rem, 1.5vw, 0.9rem);
    font-weight: 700;
    padding: 5px 18px;
    border-radius: 99px;
    letter-spacing: 0.15em;
    margin-bottom: 16px;
  }
  .header-title {
    font-size: clamp(2.4rem, 7vw, 5rem);
    font-weight: 900;
    line-height: 1.05;
    background: linear-gradient(135deg, #ffe066 0%, #ff9de2 50%, #7ed6ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 40px rgba(255,224,102,0.4));
    margin-bottom: 12px;
  }
  .header-sub {
    font-size: clamp(0.9rem, 2vw, 1.2rem);
    color: rgba(255,255,255,0.5);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  /* ツールグリッド */
  .tools-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: clamp(16px, 3vw, 28px);
    width: 100%;
  }

  .tool-card {
    background: linear-gradient(135deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.03) 100%);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 24px;
    padding: clamp(24px, 4vw, 36px);
    text-decoration: none;
    color: #fff;
    display: flex;
    flex-direction: column;
    gap: 16px;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
    animation: fadeUp 0.8s cubic-bezier(.34,1.56,.64,1) both;
    cursor: pointer;
  }
  .tool-card:nth-child(1) { animation-delay: 0.1s; }
  .tool-card:nth-child(2) { animation-delay: 0.2s; }
  .tool-card:nth-child(3) { animation-delay: 0.3s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(32px) scale(0.95); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }

  .tool-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 24px 24px 0 0;
  }
  .tool-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 20%, var(--glow) 0%, transparent 60%);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .tool-card:hover::after { opacity: 1; }
  .tool-card:hover {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.15);
    border-color: rgba(255,255,255,0.25);
  }

  .tool-icon {
    font-size: clamp(2rem, 5vw, 3rem);
    line-height: 1;
  }
  .tool-label {
    display: inline-block;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 3px 12px;
    border-radius: 99px;
    background: var(--label-bg);
    color: var(--label-color);
    letter-spacing: 0.08em;
    width: fit-content;
  }
  .tool-name {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 900;
    line-height: 1.2;
  }
  .tool-desc {
    font-size: clamp(0.85rem, 1.8vw, 1rem);
    color: rgba(255,255,255,0.6);
    line-height: 1.7;
    font-weight: 700;
  }
  .tool-arrow {
    margin-top: auto;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--label-color);
    display: flex;
    align-items: center;
    gap: 6px;
    opacity: 0.8;
    transition: gap 0.2s, opacity 0.2s;
  }
  .tool-card:hover .tool-arrow {
    gap: 12px;
    opacity: 1;
  }

  /* ミッション */
  .card-mission {
    --accent: linear-gradient(90deg, #ffe066, #ff9de2);
    --glow: rgba(255,224,102,0.08);
    --label-bg: rgba(255,224,102,0.15);
    --label-color: #ffe066;
  }
  /* トーク */
  .card-talk {
    --accent: linear-gradient(90deg, #a8ffcc, #7ed6ff);
    --glow: rgba(168,255,204,0.08);
    --label-bg: rgba(168,255,204,0.15);
    --label-color: #a8ffcc;
  }
  /* coming soon */
  .card-soon {
    --accent: linear-gradient(90deg, rgba(255,255,255,0.2), rgba(255,255,255,0.05));
    --glow: rgba(255,255,255,0.03);
    --label-bg: rgba(255,255,255,0.08);
    --label-color: rgba(255,255,255,0.4);
    opacity: 0.55;
    cursor: default;
    pointer-events: none;
  }

  /* フッター */
  .footer {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.2);
    font-weight: 700;
    letter-spacing: 0.1em;
    animation: fadeUp 0.8s 0.4s cubic-bezier(.34,1.56,.64,1) both;
  }
</style>
</head>
<body>

<div class="stars" id="stars"></div>

<div class="wrapper">
  <div class="header">
    <div class="header-badge">小学校 朝の会ツール集</div>
    <div class="header-title">Morning Tools</div>
    <div class="header-sub">使いたいツールをえらんでね</div>
  </div>

  <div class="tools-grid">

    <a href="./mission/" class="tool-card card-mission">
      <div class="tool-icon">🎯</div>
      <div class="tool-label">月曜日の朝の会</div>
      <div class="tool-name">ミッション・クエスト</div>
      <div class="tool-desc">今週のクラスミッションをルーレットで決めよう。帰りの会でふり返ろう。</div>
      <div class="tool-arrow">ひらく →</div>
    </a>

    <a href="./talk/" class="tool-card card-talk">
      <div class="tool-icon">💬</div>
      <div class="tool-label">毎朝の朝の会</div>
      <div class="tool-name">トークルーレット</div>
      <div class="tool-desc">今日のトークテーマをルーレットで決めよう。先生の話から始めよう。</div>
      <div class="tool-arrow">ひらく →</div>
    </a>

    <div class="tool-card card-soon">
      <div class="tool-icon">✨</div>
      <div class="tool-label">Coming Soon</div>
      <div class="tool-name">次のツール</div>
      <div class="tool-desc">準備中です。お楽しみに。</div>
      <div class="tool-arrow">もうすぐ →</div>
    </div>

  </div>

  <div class="footer">elementary-school-tool</div>
</div>

<script>
const starsEl = document.getElementById('stars');
for (let i = 0; i < 80; i++) {
  const s = document.createElement('div');
  s.className = 'star';
  const size = 1 + Math.random() * 3;
  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}vw;top:${Math.random()*100}vh;--dur:${2+Math.random()*5}s;animation-delay:${Math.random()*5}s`;
  starsEl.appendChild(s);
}
</script>
</body>
</html>
